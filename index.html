<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → Markdown Converter</title>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.1.2/turndown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #1e2535;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      font-size: 11px;
      background: #1e2535;
      color: #94a3b8;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #2d3748;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 65px);
    }

    .panel {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .panel-left { border-right: 1px solid #1e2535; }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Drop Zone */
    #drop-zone {
      border: 2px dashed #2d3748;
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #161b27;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #6366f1;
      background: #1a1f35;
    }
    #drop-zone .icon { font-size: 40px; margin-bottom: 10px; }
    #drop-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
    #drop-zone p { font-size: 12px; color: #64748b; margin-bottom: 14px; }
    #drop-zone .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    #drop-zone .chip {
      font-size: 11px;
      background: #1e2535;
      color: #7c8fad;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid #2d3748;
    }
    #file-input { display: none; }

    /* File info */
    #file-info {
      display: none;
      background: #161b27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 14px 16px;
      align-items: center;
      gap: 12px;
    }
    #file-info .file-icon { font-size: 26px; flex-shrink: 0; }
    #file-info .file-details { flex: 1; min-width: 0; }
    .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 11px; color: #64748b; margin-top: 2px; }
    #clear-btn {
      background: none; border: none; color: #64748b; cursor: pointer;
      font-size: 16px; padding: 4px; border-radius: 6px; transition: color 0.2s;
    }
    #clear-btn:hover { color: #ef4444; }

    /* Status */
    #status { display: none; padding: 11px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; }
    #status.loading {
      display: flex; align-items: center; gap: 10px;
      background: #1e2535; color: #94a3b8; border: 1px solid #2d3748;
    }
    #status.error { display: block; background: #2d1515; color: #f87171; border: 1px solid #7f1d1d; }
    #status.success {
      display: flex; align-items: center; gap: 8px;
      background: #0f2d1f; color: #4ade80; border: 1px solid #14532d;
    }
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid #2d3748; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats */
    #stats { display: none; gap: 10px; }
    #stats.show { display: flex; }
    .stat-card {
      flex: 1; background: #161b27; border: 1px solid #1e2535;
      border-radius: 10px; padding: 10px 14px; text-align: center;
    }
    .stat-card .val { font-size: 18px; font-weight: 700; color: #a5b4fc; }
    .stat-card .lbl { font-size: 10px; color: #475569; margin-top: 2px; }

    /* Buttons */
    .btn {
      padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; width: 100%;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #1e2535; color: #94a3b8; border: 1px solid #2d3748; flex: 1;
    }
    .btn-secondary:hover:not(:disabled) { background: #252d42; }
    .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-download { color: #a5b4fc; }
    .output-actions { display: flex; gap: 8px; }

    /* Output */
    #markdown-output {
      flex: 1; background: #161b27; border: 1px solid #2d3748;
      border-radius: 12px; padding: 18px;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12.5px; line-height: 1.7; color: #cbd5e1;
      overflow-y: auto; white-space: pre-wrap; word-break: break-word;
      resize: none;
    }
    #markdown-output.empty {
      display: flex; align-items: center; justify-content: center;
      color: #2d3748; font-family: inherit; font-size: 14px;
      white-space: normal; text-align: center;
    }

    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
      .panel-left { border-right: none; border-bottom: 1px solid #1e2535; max-height: 50vh; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">⚡ MD Convert</span>
  <span class="badge">100% Client-side · Private · No Upload</span>
</header>

<main>
  <!-- LEFT -->
  <div class="panel panel-left">
    <div class="panel-title">Upload File</div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📄</div>
      <h3>Drop your file here</h3>
      <p>or click to browse</p>
      <div class="chips">
        <span class="chip">PDF</span><span class="chip">DOCX</span>
        <span class="chip">TXT</span><span class="chip">XLSX</span>
        <span class="chip">HTML</span><span class="chip">CSV</span>
        <span class="chip">JSON</span><span class="chip">XML</span>
      </div>
    </div>

    <input type="file" id="file-input"
      accept=".pdf,.docx,.doc,.txt,.xlsx,.xls,.html,.htm,.csv,.json,.xml,.md" />

    <div id="file-info">
      <span class="file-icon" id="file-icon">📄</span>
      <div class="file-details">
        <div class="file-name" id="file-name"></div>
        <div class="file-size" id="file-size"></div>
      </div>
      <button id="clear-btn" title="Remove">✕</button>
    </div>

    <div id="status"></div>
    <div id="stats">
      <div class="stat-card"><div class="val" id="sc">—</div><div class="lbl">Characters</div></div>
      <div class="stat-card"><div class="val" id="sl">—</div><div class="lbl">Lines</div></div>
      <div class="stat-card"><div class="val" id="sw">—</div><div class="lbl">Words</div></div>
    </div>

    <button class="btn btn-primary" id="convert-btn" disabled onclick="convertFile()">
      ✨ Convert to Markdown
    </button>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <div class="panel-title">Markdown Output</div>
    <div class="output-actions">
      <button class="btn btn-secondary btn-download" id="download-btn" disabled onclick="downloadMd()">⬇ Download .md</button>
      <button class="btn btn-secondary" id="copy-btn" disabled onclick="copyMd()">📋 Copy</button>
    </div>
    <div id="markdown-output" class="empty">Your converted Markdown will appear here...</div>
  </div>
</main>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const turndownService = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });

  const FILE_ICONS = { pdf:'📕', docx:'📘', doc:'📘', txt:'📝', md:'📝',
    xlsx:'📗', xls:'📗', html:'🌐', htm:'🌐', csv:'📊', json:'📦', xml:'📦' };

  let selectedFile = null, markdownContent = '', outputFilename = '';

  const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n+'';
  const fmtBytes = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';

  function setFile(file) {
    selectedFile = file;
    const ext = file.name.split('.').pop().toLowerCase();
    document.getElementById('file-icon').textContent = FILE_ICONS[ext] || '📄';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = fmtBytes(file.size);
    document.getElementById('file-info').style.display = 'flex';
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('convert-btn').disabled = false;
    clearStatus();
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('file-info').style.display = 'none';
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('convert-btn').disabled = true;
    document.getElementById('file-input').value = '';
    clearStatus();
  }

  function clearStatus() {
    const s = document.getElementById('status');
    s.className = ''; s.style.display = 'none'; s.innerHTML = '';
  }

  function setStatus(type, msg) {
    const s = document.getElementById('status');
    s.className = type;
    if (type === 'loading') s.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
    else if (type === 'success') s.innerHTML = `<span>✅</span><span>${msg}</span>`;
    else s.innerHTML = msg;
  }

  document.getElementById('clear-btn').onclick = e => { e.stopPropagation(); clearFile(); };
  document.getElementById('file-input').onchange = e => { if (e.target.files[0]) setFile(e.target.files[0]); };

  const dz = document.getElementById('drop-zone');
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); };

  // ── Converters ──────────────────────────────────────────────

  async function convertPDF(file) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let md = `# ${file.name.replace(/\.pdf$/i, '')}\n\n`;
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const lines = [];
      let lastY = null;
      for (const item of content.items) {
        if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) lines.push('');
        lines.push(item.str);
        lastY = item.transform[5];
      }
      md += lines.join(' ').replace(/ {2,}/g, ' ') + '\n\n';
      if (pdf.numPages > 1) md += `---\n*Page ${i} of ${pdf.numPages}*\n\n`;
    }
    return md;
  }

  async function convertDOCX(file) {
    const buffer = await file.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer: buffer });
    return turndownService.turndown(result.value);
  }

  async function convertXLSX(file) {
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array' });
    let md = '';
    for (const sheetName of wb.SheetNames) {
      const ws = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!data.length) continue;
      md += `## ${sheetName}\n\n`;
      const cols = data.reduce((m, r) => Math.max(m, r.length), 0);
      const header = data[0] || [];
      const hdrs = Array.from({ length: cols }, (_, i) => String(header[i] ?? `Col${i+1}`));
      md += '| ' + hdrs.join(' | ') + ' |\n';
      md += '| ' + hdrs.map(() => '---').join(' | ') + ' |\n';
      for (const row of data.slice(1)) {
        const cells = Array.from({ length: cols }, (_, i) => String(row[i] ?? '').replace(/\|/g, '\\|').replace(/\n/g, ' '));
        md += '| ' + cells.join(' | ') + ' |\n';
      }
      md += '\n';
    }
    return md;
  }

  async function convertCSV(file) {
    const text = await file.text();
    const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    if (!rows.length) return '';
    let md = '| ' + rows[0].join(' | ') + ' |\n';
    md += '| ' + rows[0].map(() => '---').join(' | ') + ' |\n';
    for (const row of rows.slice(1)) md += '| ' + row.join(' | ') + ' |\n';
    return md;
  }

  async function convertHTML(file) {
    const text = await file.text();
    return turndownService.turndown(text);
  }

  async function convertJSON(file) {
    const text = await file.text();
    try { JSON.parse(text); } catch { return '```\n' + text + '\n```'; }
    return '```json\n' + JSON.stringify(JSON.parse(text), null, 2) + '\n```';
  }

  async function convertTXT(file) {
    return await file.text();
  }

  async function convertXML(file) {
    const text = await file.text();
    return '```xml\n' + text + '\n```';
  }

  // ── Main Convert ─────────────────────────────────────────────

  async function convertFile() {
    if (!selectedFile) return;
    const ext = selectedFile.name.split('.').pop().toLowerCase();
    const btn = document.getElementById('convert-btn');
    btn.disabled = true;
    setStatus('loading', 'Converting...');
    document.getElementById('stats').className = '';
    document.getElementById('download-btn').disabled = true;
    document.getElementById('copy-btn').disabled = true;
    const out = document.getElementById('markdown-output');
    out.className = 'empty';
    out.textContent = 'Your converted Markdown will appear here...';

    try {
      let md = '';
      if      (ext === 'pdf')                  md = await convertPDF(selectedFile);
      else if (ext === 'docx' || ext === 'doc') md = await convertDOCX(selectedFile);
      else if (ext === 'xlsx' || ext === 'xls') md = await convertXLSX(selectedFile);
      else if (ext === 'csv')                  md = await convertCSV(selectedFile);
      else if (ext === 'html' || ext === 'htm') md = await convertHTML(selectedFile);
      else if (ext === 'json')                 md = await convertJSON(selectedFile);
      else if (ext === 'xml')                  md = await convertXML(selectedFile);
      else                                     md = await convertTXT(selectedFile);

      markdownContent = md;
      outputFilename = selectedFile.name.replace(/\.[^.]+$/, '') + '.md';

      out.className = '';
      out.textContent = md;

      document.getElementById('sc').textContent = fmt(md.length);
      document.getElementById('sl').textContent = fmt(md.split('\n').length);
      document.getElementById('sw').textContent = fmt(md.trim().split(/\s+/).filter(Boolean).length);
      document.getElementById('stats').className = 'show';

      setStatus('success', `Done → ${outputFilename}`);
      document.getElementById('download-btn').disabled = false;
      document.getElementById('copy-btn').disabled = false;
    } catch (err) {
      setStatus('error', '❌ ' + err.message);
    } finally {
      btn.disabled = false;
    }
  }

  function downloadMd() {
    if (!markdownContent) return;
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([markdownContent], { type: 'text/markdown;charset=utf-8' })),
      download: outputFilename
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function copyMd() {
    if (!markdownContent) return;
    await navigator.clipboard.writeText(markdownContent);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }
</script>
</body>
</html>
